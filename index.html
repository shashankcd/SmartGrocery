<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Smart Grocery</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f7f4;color:#1a2e1a;font-size:15px}
:root{--green:#2d6a4f;--gl:#40916c;--gp:#d8f3dc;--gb:#f0faf2;--acc:#52b788;--red:#e63946;--t3:#7a9e7e;--bdr:#c8e6c9;--sh:0 2px 10px rgba(45,106,79,0.1)}
.app{width:100%;height:100%;display:flex;flex-direction:column;background:#fff}
header{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh)}
.logo-wrap{display:flex;align-items:center;gap:8px;flex:1}
.logo{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr-title{font-size:16px;font-weight:700}
.hdr-sub{font-size:10px;opacity:0.8}
.lang-sw{display:flex;gap:2px;background:rgba(255,255,255,0.15);border-radius:6px;padding:2px}
.lb{padding:2px 6px;border-radius:4px;border:none;background:transparent;color:rgba(255,255,255,0.7);font-size:10px;font-weight:600;cursor:pointer;transition:all 0.15s}
.lb.active{background:rgba(255,255,255,0.9);color:var(--green)}
.fam-badge{background:rgba(255,255,255,0.15);border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer;border:none;color:#fff}
nav{display:flex;background:#fff;border-bottom:1px solid var(--bdr);overflow-x:auto;flex-shrink:0}
.nb{flex:1;min-width:48px;padding:8px 2px 6px;border:none;background:none;font-size:9px;color:var(--t3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color 0.15s;position:relative}
.nb i{font-size:16px}
.nb.active{color:var(--green);border-bottom:2.5px solid var(--green)}
.pages{flex:1;display:flex;overflow:hidden}
.page{display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column}
.page.active{display:flex}
.card{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:var(--sh)}
.card-flat{background:var(--gb);border-radius:10px;padding:10px;margin-bottom:6px}
.fab{position:fixed;bottom:70px;right:14px;width:48px;height:48px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(45,106,79,0.35);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform 0.15s}
.fab:active{transform:scale(0.92)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:6px;border:1.5px solid var(--bdr);background:#fff;color:var(--green);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn:active{background:var(--gp)}
.btn-p{background:var(--green);color:#fff;border-color:var(--green)}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-r{color:var(--red);border-color:#ffc1c5}
.inp{width:100%;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:6px;font-size:13px;color:#1a2e1a;outline:none;background:#fff}
.inp:focus{border-color:var(--green)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.ms{background:#fff;border-radius:20px 20px 0 0;padding:18px 14px 28px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;position:relative}
.ms h3{font-size:16px;font-weight:700;margin-bottom:12px}
.mc{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:var(--gb);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--t3)}
.fr{margin-bottom:9px}
.fr label{display:block;font-size:11px;font-weight:600;color:var(--t3);margin-bottom:3px}
.pin-wrap{display:flex;gap:8px;justify-content:center;margin:12px 0}
.pin-box{width:48px;height:52px;border:2px solid var(--bdr);border-radius:8px;font-size:22px;text-align:center;outline:none}
.pin-box:focus{border-color:var(--green)}
.ir{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5}
.ir:last-child{border-bottom:none}
.ick{width:22px;height:22px;border-radius:50%;border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s;font-size:11px}
.ick.on{background:var(--green);border-color:var(--green);color:#fff}
.ii{flex:1;min-width:0}
.iname{font-size:13px;font-weight:500}
.imeta{font-size:11px;color:var(--t3);margin-top:1px}
.ir.done .iname{text-decoration:line-through;color:var(--t3)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2e1a;color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;opacity:0;z-index:1000;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ob-ov{position:fixed;inset:0;background:linear-gradient(135deg,#2d6a4f,#40916c);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px}
.ob-card{background:#fff;border-radius:20px;padding:24px 18px;width:100%;max-width:340px;text-align:center}
.lo{display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 8px;border:2px solid var(--bdr);border-radius:12px;cursor:pointer;transition:all 0.15s;flex:1}
.lo.sel{border-color:var(--green);background:var(--gb)}
.emp{text-align:center;padding:28px 14px;color:var(--t3)}
.emp i{font-size:38px;color:var(--bdr);display:block;margin-bottom:8px}
.fb{display:flex;align-items:center;justify-content:space-between}
.rf{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.quick-mark-btn{background:#ffd700;color:#1a2e1a;border:none;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer}
.quick-mark-btn:active{opacity:0.8}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">
<header>
  <div class="logo-wrap">
    <div class="logo">🛒</div>
    <div><div class="hdr-title" id="hdr-t">Smart Grocery</div><div class="hdr-sub" id="hdr-s">Family Shopping</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:5px">
    <div class="lang-sw">
      <button class="lb" onclick="setLang('hi')" id="lb-hi">हि</button>
      <button class="lb" onclick="setLang('mr')" id="lb-mr">म</button>
      <button class="lb" onclick="setLang('en')" id="lb-en">EN</button>
    </div>
    <button class="fam-badge" onclick="showMembers()" id="fam-badge">👨‍👩‍👧 <span id="fam-name">...</span></button>
  </div>
</header>

<nav>
  <button class="nb active" onclick="showPage('list',this)"><i class="ti ti-list-check"></i>List</button>
  <button class="nb" onclick="showPage('items',this)"><i class="ti ti-category"></i>Items</button>
  <button class="nb" onclick="showPage('trips',this)"><i class="ti ti-shopping-bag"></i>Trips</button>
  <button class="nb" onclick="showPage('reports',this)"><i class="ti ti-chart-bar"></i>Reports</button>
  <button class="nb" onclick="showPage('settings',this)"><i class="ti ti-settings"></i>Settings</button>
</nav>

<div class="pages">
<!-- LIST PAGE -->
<div id="page-list" class="page active">
  <div id="trip-bar" class="card" style="padding:9px 12px"></div>
  <div id="trip-actions" style="display:none;flex-wrap:wrap;gap:4px;margin-bottom:8px" class="rf"></div>
  <div id="shopping-list" style="flex:1;overflow-y:auto"></div>
</div>

<!-- ITEMS PAGE -->
<div id="page-items" class="page">
  <div style="display:flex;gap:6px;margin-bottom:8px">
    <input class="inp" id="item-search" placeholder="🔍 Search..." oninput="renderItems()" style="flex:1">
  </div>
  <div id="items-list" style="flex:1;overflow-y:auto"></div>
</div>

<!-- TRIPS PAGE -->
<div id="page-trips" class="page">
  <div style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase">Trip History</div>
  <div id="trips-list" style="flex:1;overflow-y:auto"></div>
</div>

<!-- REPORTS PAGE -->
<div id="page-reports" class="page">
  <div id="report-stats" style="display:flex;gap:6px;margin-bottom:8px"></div>
  <div id="reports-content" style="flex:1;overflow-y:auto"></div>
</div>

<!-- SETTINGS PAGE -->
<div id="page-settings" class="page" style="flex-direction:column;overflow-y:auto">
  <div style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase">Family</div>
  <div class="card" id="fam-info-card"></div>
  <div style="font-size:12px;font-weight:600;color:var(--t3);margin-top:10px;margin-bottom:6px;text-transform:uppercase">Language</div>
  <div class="card">
    <div style="display:flex;gap:8px">
      <div class="lo" id="lo-hi" onclick="setLang('hi')"><div style="font-size:22px">🇮🇳</div><div style="font-size:12px;font-weight:700">हिंदी</div></div>
      <div class="lo" id="lo-mr" onclick="setLang('mr')"><div style="font-size:22px">🇮🇳</div><div style="font-size:12px;font-weight:700">मराठी</div></div>
      <div class="lo" id="lo-en" onclick="setLang('en')"><div style="font-size:22px">🇬🇧</div><div style="font-size:12px;font-weight:700">English</div></div>
    </div>
  </div>
  <div style="font-size:12px;font-weight:600;color:var(--t3);margin-top:10px;margin-bottom:6px;text-transform:uppercase">Tools</div>
  <div class="card">
    <div style="display:flex;flex-direction:column;gap:7px">
      <button class="btn btn-p" style="width:100%" onclick="loadDefaultItems()"><i class="ti ti-sparkles"></i> Load Default Items</button>
      <button class="btn" style="width:100%" onclick="exportCSV()"><i class="ti ti-file-spreadsheet"></i> Export CSV</button>
      <button class="btn btn-r" style="width:100%" onclick="logout()"><i class="ti ti-logout"></i> Leave Family</button>
    </div>
  </div>
</div>
</div>
</div>

<button class="fab" id="main-fab" onclick="fabClick()"><i class="ti ti-plus"></i></button>
</div>

<!-- ONBOARD -->
<div id="ob-ov" class="ob-ov" style="display:none">
<div class="ob-card">
  <div style="font-size:32px;margin-bottom:8px">🛒</div>
  <div style="font-size:18px;font-weight:700;margin-bottom:3px">Smart Grocery</div>
  <div style="font-size:13px;color:var(--t3);margin-bottom:18px">Family Shopping List</div>
  <div style="display:flex;gap:8px;margin-bottom:16px" id="lang-choices"></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-p" style="flex:1;justify-content:center" onclick="showFamilySetup('create')"><i class="ti ti-plus"></i> Create</button>
    <button class="btn" style="flex:1;justify-content:center" onclick="showFamilySetup('join')"><i class="ti ti-login"></i> Join</button>
  </div>
</div>
</div>

<!-- MODALS -->
<div class="mo" id="m-item">
<div class="ms">
  <button class="mc" onclick="closeM('m-item')"><i class="ti ti-x"></i></button>
  <h3 id="item-title">Add Item</h3>
  <div class="fr"><label>Name *</label><input class="inp" id="f-name" placeholder="e.g. Aata"></div>
  <div class="fr"><label>Category *</label><select class="inp" id="f-cat"></select></div>
  <div style="display:flex;gap:6px">
    <div class="fr" style="flex:1"><label>Qty</label><input class="inp" id="f-qty" type="number" placeholder="1" step="0.1"></div>
    <div class="fr" style="flex:1"><label>Unit</label><select class="inp" id="f-unit"><option>pcs</option><option>kg</option><option>g</option><option>L</option><option>ml</option><option>pack</option><option>bottle</option></select></div>
  </div>
  <div class="fr"><label>Price (₹)</label><input class="inp" id="f-price" type="number" placeholder="0"></div>
  <div style="display:flex;gap:6px;margin-top:10px">
    <button class="btn" style="flex:1" onclick="closeM('m-item')">Cancel</button>
    <button class="btn btn-p" style="flex:1" onclick="saveItem()">Save</button>
  </div>
</div>
</div>

<div class="mo" id="m-trip">
<div class="ms">
  <button class="mc" onclick="closeM('m-trip')"><i class="ti ti-x"></i></button>
  <h3>New Trip</h3>
  <div class="fr"><label>Trip Name</label><input class="inp" id="t-name" placeholder="Weekly Shopping"></div>
  <div class="fr"><label>Budget (₹)</label><input class="inp" id="t-budget" type="number" placeholder="0"></div>
  <button class="btn btn-p" style="width:100%;margin-top:8px" onclick="createTrip()">Start Trip 🛒</button>
</div>
</div>

<div class="mo" id="m-mark">
<div class="ms">
  <button class="mc" onclick="closeM('m-mark')"><i class="ti ti-x"></i></button>
  <h3 id="mark-title">Mark Item</h3>
  <div class="fr"><label>Amount Paid (₹) *</label><input class="inp" id="mark-amt" type="number" placeholder="0" autofocus></div>
  <div class="fr"><label>Qty (optional)</label><input class="inp" id="mark-qty" type="number" placeholder=""></div>
  <div style="display:flex;gap:6px;margin-top:8px">
    <button class="btn" style="flex:1" onclick="closeM('m-mark')">Cancel</button>
    <button class="btn btn-p" style="flex:1" onclick="saveMark()">✓ Mark</button>
  </div>
</div>
</div>

<div class="mo" id="m-add-items">
<div class="ms" style="max-height:85vh;overflow-y:auto">
  <button class="mc" onclick="closeM('m-add-items')"><i class="ti ti-x"></i></button>
  <h3>Add Items to Trip</h3>
  <div style="font-size:11px;color:var(--t3);margin-bottom:8px">Tap to add to list</div>
  <div id="add-items-list"></div>
</div>
</div>

<div class="mo" id="m-members">
<div class="ms">
  <button class="mc" onclick="closeM('m-members')"><i class="ti ti-x"></i></button>
  <h3>Family Members</h3>
  <div id="members-list"></div>
</div>
</div>

<div class="mo" id="m-family-setup">
<div class="ms">
  <button class="mc" onclick="closeM('m-family-setup')"><i class="ti ti-x"></i></button>
  <div id="fam-setup-content"></div>
</div>
</div>

<div class="mo" id="m-history">
<div class="ms" style="max-height:85vh;overflow-y:auto">
  <button class="mc" onclick="closeM('m-history')"><i class="ti ti-x"></i></button>
  <h3 id="hist-title">Trip Details</h3>
  <div id="hist-content"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================================
// 🔥 PASTE YOUR FIREBASE CONFIG HERE
// ================================
const firebaseConfig = {
  apiKey: "AIzaSyDtlATxvywvU5jsyvYE6VcmwLBzOCVhpRY",
  authDomain: "smart-grocery-402c3.firebaseapp.com",
  projectId: "smart-grocery-402c3",
  storageBucket: "smart-grocery-402c3.firebasestorage.app",
  messagingSenderId: "739331723704",
  appId: "1:739331723704:web:df442d9f5399f7ab667f4d"
};
// ================================

const CATS=[{id:'grain',name:'Anaj & Dal',icon:'🌾'},{id:'dairy',name:'Dairy',icon:'🥛'},{id:'veg',name:'Sabzi',icon:'🥦'},{id:'masala',name:'Masale',icon:'🌶️'},{id:'snack',name:'Snacks',icon:'🍪'},{id:'sauce',name:'Sauces',icon:'🍯'},{id:'noodle',name:'Noodles',icon:'🍜'},{id:'hygiene',name:'Soap',icon:'🧴'},{id:'house',name:'Home',icon:'🧹'},{id:'other',name:'Other',icon:'📦'}];

const T={
  hi:{list:'लिस्ट',items:'आइटम',trips:'ट्रिप',reports:'रिपोर्ट',settings:'सेटिंग',new_trip:'नई ट्रिप',add_items:'आइटम जोड़ें',mark:'✓ मार्क',marked:'✓ मार्क हो गया',unmarked:'अनमार्क',delete_confirm:'Delete करें?',trip_start:'ट्रिप शुरू!',trip_end:'ट्रिप खत्म!',no_trip:'कोई ट्रिप नहीं',added:'जुड़ा ✓',updated:'अपडेट ✓',deleted:'डिलीट',select_all:'सब मार्क',unmark_all:'अनमार्क',end_trip:'खत्म करो',all_bought:'🎉 सब मिल गए!'},
  mr:{list:'यादी',items:'वस्तू',trips:'ट्रिप',reports:'अहवाल',settings:'सेटिंग',new_trip:'नवीन ट्रिप',add_items:'वस्तू जोडा',mark:'✓ मार्क',marked:'✓ मार्क झाले',unmarked:'अनमार्क',delete_confirm:'डिलीट करा?',trip_start:'ट्रिप सुरू!',trip_end:'ट्रिप संपली!',no_trip:'कोणतीही ट्रिप नाही',added:'जोडले ✓',updated:'अपडेट ✓',deleted:'डिलीट',select_all:'सर्व मार्क',unmark_all:'अनमार्क',end_trip:'संपवा',all_bought:'🎉 सर्व मिळाले!'},
  en:{list:'List',items:'Items',trips:'Trips',reports:'Reports',settings:'Settings',new_trip:'New Trip',add_items:'Add Items',mark:'✓ Mark',marked:'✓ Marked',unmarked:'Unmarked',delete_confirm:'Delete?',trip_start:'Trip started!',trip_end:'Trip ended!',no_trip:'No trip',added:'Added ✓',updated:'Updated ✓',deleted:'Deleted',select_all:'Mark All',unmark_all:'Unmark All',end_trip:'End Trip',all_bought:'🎉 All bought!'}
};

let lang='hi',session=null,familyData=null,items=[],trips=[],activeTrip=null;
let db=null,editingItemId=null,markingItemId=null;
let unsubItems=null,unsubTrips=null,unsubFamily=null;

function t(k){return T[lang]?.[k]||T.en[k]||k;}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function setLang(l){lang=l;localStorage.setItem('sg_lang',l);renderAll();document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));document.getElementById('lb-'+l).classList.add('active');}
function getCat(id){return CATS.find(c=>c.id===id)||{name:'Other',icon:'📦'};}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function hashPin(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return Math.abs(h).toString(16);}
function getPinVal(wrapId){return [...document.querySelectorAll('#'+wrapId+' .pin-box')].map(b=>b.value).join('');}
function fp(p){return p?'₹'+Number(p).toLocaleString('en-IN'):'—';}

// ===== FIREBASE INIT =====
function initFirebase(){
  const app=firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();
  console.log('Firebase initialized');
}

// ===== LOAD SESSION =====
function loadSession(){
  try{const s=localStorage.getItem('sg_session');if(s)session=JSON.parse(s);}catch(e){}
  lang=localStorage.getItem('sg_lang')||'hi';
}

// ===== SAVE SESSION =====
function saveSession(){localStorage.setItem('sg_session',JSON.stringify(session));}

// ===== SHOW FAB CLICK =====
async function fabClick(){
  const activePage=document.querySelector('.page.active').id;
  if(activePage==='page-list'){
    if(!activeTrip)openM('m-trip');
    else openM('m-add-items');
  } else if(activePage==='page-items'){
    editingItemId=null;
    document.getElementById('item-title').textContent='Add Item';
    document.getElementById('f-name').value='';
    document.getElementById('f-qty').value='';
    document.getElementById('f-price').value='';
    populateCatSelect();
    openM('m-item');
  }
}

// ===== FAMILY SETUP =====
function showFamilySetup(mode){
  closeM('m-family-setup');
  const el=document.getElementById('fam-setup-content');
  if(mode==='create'){
    el.innerHTML=`<h3>Create Family</h3>
    <div class="fr"><label>Your Name</label><input class="inp" id="fs-name" placeholder="Rahul"></div>
    <div class="fr"><label>Family Name</label><input class="inp" id="fs-fam" placeholder="Sharma Family"></div>
    <div class="fr"><label>Family Code (unique)</label><input class="inp" id="fs-code" placeholder="SHARMA123" style="text-transform:uppercase"></div>
    <div class="fr"><label>PIN (4 digits)</label><div class="pin-wrap" id="fs-pin"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"></div></div>
    <button class="btn btn-p" style="width:100%;margin-top:8px" onclick="createFamily()">Create Family 👨‍👩‍👧</button>`;
    setupPinBoxes('fs-pin');
  } else {
    el.innerHTML=`<h3>Join Family</h3>
    <div class="fr"><label>Your Name</label><input class="inp" id="fj-name" placeholder="Priya"></div>
    <div class="fr"><label>Family Code</label><input class="inp" id="fj-code" placeholder="SHARMA123" style="text-transform:uppercase"></div>
    <div class="fr"><label>PIN</label><div class="pin-wrap" id="fj-pin"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"><input class="pin-box" type="password" inputmode="numeric" maxlength="1"></div></div>
    <button class="btn btn-p" style="width:100%;margin-top:8px" onclick="joinFamily()">Join Family 👥</button>`;
    setupPinBoxes('fj-pin');

function setupPinBoxes(wrapId){
  setTimeout(()=>{
    const boxes=[...document.querySelectorAll('#'+wrapId+' .pin-box')];
    boxes.forEach((box,i)=>{
      box.addEventListener('input',()=>{if(box.value&&i<boxes.length-1)boxes[i+1].focus();});
      box.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!box.value&&i>0)boxes[i-1].focus();});
    });
  },100);
}

async function createFamily(){
  const name=document.getElementById('fs-name').value.trim();
  const fam=document.getElementById('fs-fam').value.trim();
  const code=document.getElementById('fs-code').value.trim().toUpperCase();
  const pin=getPinVal('fs-pin');
  if(!name||!fam||!code||pin.length!==4){toast('Fill all fields!');return;}
  const memberId=uid();
  const doc={name:fam,code,pinHash:hashPin(pin),adminId:memberId,createdAt:new Date().toISOString(),members:{}};
  doc.members[memberId]={name,joinedAt:new Date().toISOString(),isAdmin:true};
  await firebase.firestore.setDoc(firebase.firestore.doc(db,'families',code),doc);
  session={memberId,name,code,isAdmin:true};
  saveSession();
  closeM('m-family-setup');
  initApp();
}

async function joinFamily(){
  const name=document.getElementById('fj-name').value.trim();
  const code=document.getElementById('fj-code').value.trim().toUpperCase();
  const pin=getPinVal('fj-pin');
  if(!name||!code||pin.length!==4){toast('Fill all fields!');return;}
  const snap=await firebase.firestore.getDoc(firebase.firestore.doc(db,'families',code));
  if(!snap.exists()){toast('Code not found!');return;}
  const data=snap.data();
  if(data.pinHash!==hashPin(pin)){toast('Wrong PIN!');return;}
  const memberId=uid();
  await firebase.firestore.updateDoc(firebase.firestore.doc(db,'families',code),{['members.'+memberId]:{name,joinedAt:new Date().toISOString(),isAdmin:false}});
  session={memberId,name,code,isAdmin:data.adminId===memberId};
  saveSession();
  closeM('m-family-setup');
  initApp();
}

// ===== INIT APP =====
async function initApp(){
  if(!session){showOnboard();return;}
  document.getElementById('app').style.display='flex';
  document.getElementById('ob-ov').style.display='none';
  familyData=await firebase.firestore.getDoc(firebase.firestore.doc(db,'families',session.code));
  if(!familyData.exists()){toast('Family deleted');logout();return;}
  familyData=familyData.data();
  document.getElementById('fam-name').textContent=familyData.name;
  listenItems();listenTrips();listenFamily();
  renderAll();
}

function showOnboard(){
  document.getElementById('app').style.display='none';

  lo.innerHTML=`<div class="lo sel" id="lo-hi" onclick="setLang('hi')"><div style="font-size:20px">🇮🇳</div><div style="font-size:11px;font-weight:700">हिंदी</div></div>

function listenItems(){
  if(unsubItems)unsubItems();
  const col=firebase.firestore.collection(db,'families/'+session.code+'/items');
  unsubItems=firebase.firestore.onSnapshot(col,snap=>{items=snap.docs.map(d=>({id:d.id,...d.data()}));});
}

function listenTrips(){
  if(unsubTrips)unsubTrips();
  const q=firebase.firestore.query(firebase.firestore.collection(db,'families/'+session.code+'/trips'),firebase.firestore.orderBy('createdAt','desc'));
  unsubTrips=firebase.firestore.onSnapshot(q,snap=>{
    trips=snap.docs.map(d=>({id:d.id,...d.data()}));
    activeTrip=trips.find(t=>!t.done);
    renderShoppingList();renderTrips();
  });
}

function listenFamily(){
  if(unsubFamily)unsubFamily();
  unsubFamily=firebase.firestore.onSnapshot(firebase.firestore.doc(db,'families',session.code),snap=>{if(snap.exists())familyData=snap.data();});
}

async function saveItem(){

// ===== TRIPS =====
async function createTrip(){
  const name=document.getElementById('t-name').value.trim()||'Shopping '+new Date().toLocaleDateString();
  const budget=parseFloat(document.getElementById('t-budget').value)||0;
  const trip={name,budget,done:false,total:0,createdAt:firebase.firestore.serverTimestamp(),createdBy:session.name,items:[]};
  await firebase.firestore.addDoc(firebase.firestore.collection(db,'families/'+session.code+'/trips'),trip);
  closeM('m-trip');
  document.getElementById('t-name').value='';
  document.getElementById('t-budget').value='';
  toast(t('trip_start'));
}

async function endTrip(){
  if(!activeTrip)return;
  if(!confirm(t('end_trip')+'?'))return;
  const total=activeTrip.items?.reduce((s,i)=>s+(i.paidAmount||0),0)||0;
  await firebase.firestore.updateDoc(firebase.firestore.doc(db,'families/'+session.code+'/trips',activeTrip.id),{done:true,total,endedBy:session.name,endedAt:new Date().toISOString()});
  toast(t('trip_end'));
}

function renderShoppingList(){
  const bar=document.getElementById('trip-bar'),actions=document.getElementById('trip-actions');
  if(!activeTrip){
    bar.innerHTML='<div class="fb"><div style="color:var(--t3);font-size:12px">'+t('no_trip')+'</div></div>';
    actions.style.display='none';
    document.getElementById('shopping-list').innerHTML='<div class="emp"><i class="ti ti-shopping-cart-off"></i><div>'+t('no_trip')+'</div></div>';
    return;
  }
  const listItems=activeTrip.items||[];
  const done=listItems.filter(i=>i.checked).length;
  const total=listItems.reduce((s,i)=>s+(i.paidAmount||0),0);
  bar.innerHTML='<div class="fb" style="margin-bottom:3px"><div><div style="font-size:13px;font-weight:700">'+activeTrip.name+'</div><div style="font-size:11px;color:var(--t3)">'+done+'/'+listItems.length+' · '+fp(total)+(activeTrip.budget?' / '+fp(activeTrip.budget):'')+'</div></div><button class="btn btn-sm btn-r" onclick="endTrip()"><i class="ti ti-flag"></i></button></div>';
  if(activeTrip.budget){const pct=Math.min(100,Math.round(total/activeTrip.budget*100));bar.innerHTML+='<div style="height:4px;background:#e8f5e9;border-radius:2px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(pct>90?'#e63946':'#2d6a4f')+'"></div></div>';}
  actions.style.display='flex';
  actions.innerHTML='<button class="btn btn-sm" onclick="selectAll()"><i class="ti ti-check"></i> '+t('select_all')+'</button><button class="btn btn-sm" onclick="unselectAll()"><i class="ti ti-x"></i> '+t('unmark_all')+'</button>';
  const el=document.getElementById('shopping-list');
  const byCat={};(listItems||[]).forEach(i=>{if(!byCat[i.catId])byCat[i.catId]=[];byCat[i.catId].push(i);});
  el.innerHTML='';
  Object.keys(byCat).forEach(catId=>{
    const cat=getCat(catId);const catItems=byCat[catId];const doneInCat=catItems.filter(i=>i.checked).length;
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="rf" style="margin-bottom:8px"><div style="font-size:18px">'+cat.icon+'</div><div style="flex:1"><div style="font-size:13px;font-weight:600">'+cat.name+'</div><div style="font-size:11px;color:var(--t3)">'+doneInCat+'/'+catItems.length+'</div></div></div>';
    catItems.forEach(item=>{
      const row=document.createElement('div');row.className='ir'+(item.checked?' done':'');
      const btns='<div style="display:flex;gap:3px"><button class="quick-mark-btn" onclick="quickMark(\''+item.id+'\')">💰</button><button class="btn btn-sm btn-r" style="padding:3px 6px" onclick="removeItem(\''+item.id+'\')"><i class="ti ti-trash"></i></button></div>';
      row.innerHTML='<div class="ick '+(item.checked?'on':'')+'" onclick="toggleMark(\''+item.id+'\')"><i class="ti ti-check"></i></div><div class="ii"><div class="iname">'+item.name+'</div><div class="imeta">'+item.qty+' '+item.unit+(item.checkedBy?'·'+item.checkedBy:'')+' '+(item.checked&&item.paidAmount?'<b style="color:#2d6a4f">'+fp(item.paidAmount)+'</b>':'')+'</div></div>'+btns;
      card.appendChild(row);
    });
    el.appendChild(card);
  });
}

async function toggleMark(itemId){
  const item=activeTrip.items.find(i=>i.id===itemId);if(!item)return;
  if(item.checked){item.checked=false;item.paidAmount=0;item.checkedBy=null;await saveTrip();toast(t('unmarked'));return;}
  markingItemId=itemId;
  document.getElementById('mark-title').textContent=item.name;
  document.getElementById('mark-amt').value=item.price||'';
  document.getElementById('mark-qty').value=item.qty||'';
  openM('m-mark');
}

async function quickMark(itemId){
  const item=activeTrip.items.find(i=>i.id===itemId);if(!item)return;
  if(item.checked){item.checked=false;item.paidAmount=0;item.checkedBy=null;}else{item.checked=true;item.paidAmount=item.price||0;item.checkedBy=session.name;item.qty=item.qty||1;}
  await saveTrip();
  toast(item.checked?t('marked'):t('unmarked'));
}

async function saveMark(){
  const item=activeTrip.items.find(i=>i.id===markingItemId);if(!item)return;
  item.checked=true;
  item.paidAmount=parseFloat(document.getElementById('mark-amt').value)||0;
  const q=parseFloat(document.getElementById('mark-qty').value);if(q)item.qty=q;
  item.checkedBy=session.name;
  await saveTrip();
  closeM('m-mark');
  const done=activeTrip.items.filter(i=>i.checked).length;
  toast(done===activeTrip.items.length?t('all_bought'):t('marked'));
}

async function removeItem(itemId){
  activeTrip.items=activeTrip.items.filter(i=>i.id!==itemId);
  await saveTrip();
}

async function selectAll(){
  activeTrip.items.forEach(i=>{i.checked=true;i.paidAmount=i.paidAmount||i.price||0;i.checkedBy=session.name;});
  await saveTrip();
  toast(t('select_all'));
}

async function unselectAll(){
  activeTrip.items.forEach(i=>{i.checked=false;i.paidAmount=0;i.checkedBy=null;});
  await saveTrip();
  toast(t('unmark_all'));
}

async function saveTrip(){
  const total=activeTrip.items.reduce((s,i)=>s+(i.paidAmount||0),0);
  await firebase.firestore.updateDoc(firebase.firestore.doc(db,'families/'+session.code+'/trips',activeTrip.id),{items:activeTrip.items,total});
}

function renderAddItemsModal(){
  const el=document.getElementById('add-items-list');el.innerHTML='';
  const byCat={};items.forEach(i=>{if(!byCat[i.catId])byCat[i.catId]=[];byCat[i.catId].push(i);});
  Object.keys(byCat).forEach(catId=>{
    const cat=getCat(catId);
    const sec=document.createElement('div');
    sec.innerHTML='<div style="font-size:11px;font-weight:600;color:var(--t3);margin:8px 0 4px">'+cat.icon+' '+cat.name+'</div>';
    byCat[catId].forEach(item=>{
      const inList=activeTrip?.items?.find(i=>i.masterItemId===item.id);
      const btn=document.createElement('button');btn.className='btn btn-p'+(inList?' ✓':'');btn.style.width='100%';btn.style.marginBottom='4px';btn.style.justifyContent='flex-start';
      btn.textContent=(inList?'✓ ':'') + item.name + ' ('+item.qty+' '+item.unit+')';
      btn.onclick=async ()=>{
        if(!inList){
          const newItem={id:uid(),masterItemId:item.id,name:item.name,catId:item.catId,qty:item.qty,unit:item.unit,price:item.price||0,checked:false,paidAmount:0};
          activeTrip.items.push(newItem);
          await saveTrip();
          btn.textContent='✓ '+item.name;
          btn.classList.add('btn-p');
        }
      };
      sec.appendChild(btn);
    });
    el.appendChild(sec);
  });
}

function renderTrips(){
  const el=document.getElementById('trips-list');
  const comp=trips.filter(t=>t.done);
  if(!comp.length){el.innerHTML='<div class="emp"><i class="ti ti-history-off"></i><div>No trips</div></div>';return;}
  el.innerHTML='';
  comp.forEach(trip=>{
    const card=document.createElement('div');card.className='card';card.style.cursor='pointer';
    const d=trip.createdAt?.toDate?trip.createdAt.toDate():new Date();
    const items=trip.items||[];const done=items.filter(i=>i.checked).length;
    card.innerHTML='<div class="fb" style="margin-bottom:3px"><div style="font-weight:600;font-size:13px">'+trip.name+'</div><span style="font-size:12px;background:#d8f3dc;color:#2d6a4f;padding:2px 8px;border-radius:12px">'+fp(trip.total)+'</span></div><div style="font-size:11px;color:var(--t3)">'+d.toLocaleDateString()+'  ·  '+done+'/'+items.length+' items</div>';
    card.onclick=()=>showHistory(trip);
    el.appendChild(card);
  });
}

function showHistory(trip){
  const items=trip.items||[];
  const d=trip.createdAt?.toDate?trip.createdAt.toDate():new Date();
  let html='<div style="font-size:11px;color:var(--t3);margin-bottom:8px">'+d.toLocaleDateString()+' · '+trip.createdBy+'</div>';
  const byCat={};items.forEach(i=>{if(!byCat[i.catId])byCat[i.catId]=[];byCat[i.catId].push(i);});
  Object.keys(byCat).forEach(catId=>{
    const cat=getCat(catId);const catItems=byCat[catId];
    html+='<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+cat.icon+' '+cat.name+'</div>';
    catItems.forEach(i=>{html+='<div style="font-size:12px;padding:3px 0;border-bottom:1px solid #f0f0f0">'+(i.checked?'✅':'⬜')+' '+i.name+' · '+(i.checked?fp(i.paidAmount):'—')+(i.checkedBy?'<span style="font-size:10px;color:var(--t3)"> ·'+i.checkedBy+'</span>':'')+'</div>';});
    html+='</div>';
  });
  document.getElementById('hist-content').innerHTML=html;
  openM('m-history');
}

function renderReports(){
  const done=trips.filter(t=>t.done&&t.total>0);
  if(!done.length)return;
  const totalSpent=done.reduce((s,t)=>s+t.total,0);
  const avg=done.length?Math.round(totalSpent/done.length):0;
  document.getElementById('report-stats').innerHTML='<div style="flex:1;background:#f0faf2;padding:8px;border-radius:10px;text-align:center"><div style="font-size:17px;font-weight:700;color:#2d6a4f">'+fp(totalSpent)+'</div><div style="font-size:10px;color:var(--t3)">Total</div></div><div style="flex:1;background:#f0faf2;padding:8px;border-radius:10px;text-align:center"><div style="font-size:17px;font-weight:700;color:#2d6a4f">'+done.length+'</div><div style="font-size:10px;color:var(--t3)">Trips</div></div><div style="flex:1;background:#f0faf2;padding:8px;border-radius:10px;text-align:center"><div style="font-size:17px;font-weight:700;color:#2d6a4f">'+fp(avg)+'</div><div style="font-size:10px;color:var(--t3)">Avg</div></div>';

function renderMembers(){

function renderFamilyInfo(){
  const el=document.getElementById('fam-info-card');

  el.innerHTML='<div class="rf" style="margin-bottom:8px"><div style="font-size:20px">👨‍👩‍👧</div><div><div style="font-weight:700;font-size:13px">'+familyData.name+'</div><div style="font-size:10px;color:var(--t3)">Code: '+session.code+' · '+mems.length+' members</div></div></div>';

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn)btn.classList.add('active');
  if(p==='list'){renderShoppingList();renderAddItemsModal();}
  else if(p==='items'){renderItems();}
  else if(p==='trips'){renderTrips();}
  else if(p==='reports'){renderReports();}
  else if(p==='settings'){renderFamilyInfo();}
}

function renderAll(){
  setLang(lang);
  showPage('list',document.querySelector('.nb'));
}

function exportCSV(){
  const done=trips.filter(t=>t.done);
  let csv='Trip,Date,Item,Qty,Unit,Est,Paid,By\n';
  done.forEach(t=>{const d=t.createdAt?.toDate?t.createdAt.toDate():new Date();(t.items||[]).filter(i=>i.checked).forEach(i=>{csv+='"'+t.name+'","'+d.toLocaleDateString()+'","'+i.name+'",'+i.qty+','+i.unit+','+i.price+','+i.paidAmount+',"'+i.checkedBy+'"\n';});});
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='grocery_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function logout(){
  session=null;localStorage.removeItem('sg_session');
  if(unsubItems)unsubItems();if(unsubTrips)unsubTrips();if(unsubFamily)unsubFamily();
  document.getElementById('app').style.display='none';
  showOnboard();
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded',()=>{
  initFirebase();
  loadSession();
  lang=localStorage.getItem('sg_lang')||'hi';
  if(session?.code)initApp();
  else showOnboard();
  // Setup lang buttons
  document.querySelectorAll('.lo').forEach(b=>{b.classList.remove('sel');});
  document.getElementById('lo-'+lang).classList.add('sel');
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));
  document.getElementById('lb-'+lang).classList.add('active');
});
</script>
</body>
</html>
